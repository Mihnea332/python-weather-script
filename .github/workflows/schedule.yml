name: Send WhatsApp Weather Report

on:
  schedule:
    # Rulează zilnic la 06:00 și 14:00 UTC (09:00 și 17:00 ora României)
    - cron: '0 6,14 * * *'
  workflow_dispatch: 
    # Acest rând îți permite să rulezi manual scriptul din GitHub cu un buton, ca să îl poți testa imediat

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests twilio

      - name: Run Python script
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          YOUR_PHONE_NUMBER: ${{ secrets.YOUR_PHONE_NUMBER }}
        run: python main.py
